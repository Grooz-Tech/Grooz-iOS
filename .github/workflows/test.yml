name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: tartelet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: fastlane test

  beta:
    runs-on: tartelet
    needs: test
    environment: testflight
    env:
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_API_KEY_ADMIN_B64 }}
      # Monotonic build number for the TestFlight upload (Project.swift reads this).
      TUIST_CURRENT_PROJECT_VERSION: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth
        uses: ./.github/actions/git-auth
        with:
          token: ${{ secrets.GIT_AUTH_TOKEN }}

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Build and upload to TestFlight
        run: fastlane beta
