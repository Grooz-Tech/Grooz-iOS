name: PR

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: tartelet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth
        uses: ./.github/actions/git-auth
        with:
          token: ${{ secrets.GIT_AUTH_TOKEN }}

      - name: Install dependencies
        run: tuist install

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: fastlane test

  build:
    runs-on: tartelet
    env:
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      TUIST_CURRENT_PROJECT_VERSION: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth
        uses: ./.github/actions/git-auth
        with:
          token: ${{ secrets.GIT_AUTH_TOKEN }}

      - name: Install dependencies
        run: tuist install

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Build
        run: fastlane build

      - name: Upload IPA and dSYM
        uses: actions/upload-artifact@v4
        with:
          name: Grooz-${{ env.TUIST_CURRENT_PROJECT_VERSION }}
          path: |
            *.ipa
            *.dSYM.zip
          if-no-files-found: error
          retention-days: 14
