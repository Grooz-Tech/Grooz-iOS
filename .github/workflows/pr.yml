name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}

jobs:
  test:
    runs-on: tartelet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: fastlane test
