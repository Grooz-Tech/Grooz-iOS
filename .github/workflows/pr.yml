name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}

jobs:
  test:
    runs-on: tartelet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth
        uses: ./.github/actions/git-auth
        with:
          token: ${{ secrets.GIT_AUTH_TOKEN }}

      - name: Install dependencies
        run: tuist install

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: fastlane test
